<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Usodus Systems - Digital transformation company focused on creating user-centric platforms. We provide super privilege access to innovation." />
    <meta name="keywords" content="digital transformation, platform development, cloud solutions, user experience, technology consulting, software development" />
    <meta name="author" content="Usodus Systems" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.usodus.com/" />
    <meta property="og:title" content="Usodus Systems - Digital Transformation Powered by People" />
    <meta property="og:description" content="We create platforms that empower your business with super privilege access to innovation." />
    <meta property="og:site_name" content="Usodus Systems" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.usodus.com/" />
    <meta name="twitter:title" content="Usodus Systems - Digital Transformation Powered by People" />
    <meta name="twitter:description" content="We create platforms that empower your business with super privilege access to innovation." />
    
    <!-- Favicon - Using a data URL for the icon based on brand colors -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/favicon-32x32.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#002D91" />
    
    <title>Usodus Systems - Digital Transformation Powered by People</title>
  </head>
