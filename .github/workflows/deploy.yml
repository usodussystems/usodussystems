name: Deploy to GitHub Pages

# Builds from source and publishes the result to GitHub Pages, so it must run
# on the DEFAULT branch (main) — not on gh-pages (that branch is the published
# output of older Pages setups, not the source).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NOTE: vite.config.ts uses `base: '/'`. That serves assets from the site
      # root (`/assets`, `/logo-navbar.png`), which only works for a
      # custom-domain Pages site or a user/org root Pages site
      # (https://<user>.github.io/). For PROJECT Pages
      # (https://<user>.github.io/<repo>/) those root-absolute paths 404 — that
      # would require `base: '/<repo>/'`. Do not change base here without
      # confirming the deploy target.
      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
