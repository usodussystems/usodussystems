name: Terraform


on:
  pull_request:
  push:
    branches: 
    - main
    - claude/*
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' || inputs.action != 'apply' }}

env:
  AWS_REGION: us-east-1  

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      deploy_inputs_available: ${{ steps.deploy_inputs.outputs.available }}
      plan_created: ${{ steps.tf_plan.outputs.created }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Check deploy inputs
        id: deploy_inputs
        working-directory: .
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          INFRA_VARS: ${{ secrets.INFRA_VARS }}
          BACKEND_VARS: ${{ secrets.BACKEND_VARS }}
        run: |
          missing=0
          for name in \
            AWS_ROLE_TO_ASSUME \
            INFRA_VARS \
            BACKEND_VARS
          do
            if [ -z "${!name}" ]; then
              echo "::notice title=Terraform plan skipped::${name} is not configured."
              missing=1
            fi
          done

          if [ "${missing}" -eq 0 ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Require deploy inputs for apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && steps.deploy_inputs.outputs.available != 'true' }}
        working-directory: .
        run: |
          echo "::error title=Apply unavailable::Configure the required Terraform secrets and variables before running action=apply."
          exit 1

      - name: Setup Node
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Build frontend
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        working-directory: .
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: actions/upload-artifact@v7
        with:
          name: terraform-frontend-build-${{ github.run_id }}
          path: build
          if-no-files-found: error
          retention-days: 14

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-terraform-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (remote backend)
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        env:
          INFRA_VARS: ${{ secrets.INFRA_VARS }}
          BACKEND_VARS: ${{ secrets.BACKEND_VARS }}
        run: |
          printf '%s\n' "${BACKEND_VARS}" > backend.hcl
          printf '%s\n' "${INFRA_VARS}" > var.auto.tfvars
          terraform init -reconfigure -backend-config=backend.hcl -input=false

      - name: Terraform Plan
        id: tf_plan
        if: ${{ steps.deploy_inputs.outputs.available == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          echo "created=true" >> "${GITHUB_OUTPUT}"

      - name: Upload Terraform plan
        if: ${{ steps.tf_plan.outputs.created == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: error
          retention-days: 7

  apply:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && needs.plan.outputs.plan_created == 'true' }}
    runs-on: ubuntu-latest
    needs: plan
    environment: Production
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-frontend-build-${{ github.run_id }}
          path: build

      - name: Download Terraform plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-terraform-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (remote backend)
        env:
          INFRA_VARS: ${{ secrets.INFRA_VARS }}
          BACKEND_VARS: ${{ secrets.BACKEND_VARS }}
        run: |
          printf '%s\n' "${BACKEND_VARS}" > backend.hcl
          printf '%s\n' "${INFRA_VARS}" > var.auto.tfvars
          terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply Saved Plan
        run: terraform apply -input=false -no-color tfplan

      - name: Post-deploy smoke check
        working-directory: .
        run: |
          SMOKE_URL="$(python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          try:
            raw = subprocess.check_output(
              ["terraform", "-chdir=terraform", "output", "-json", "site_urls"],
              text=True,
            )
            site_urls = json.loads(raw)
          except Exception as exc:
            print(f"::warning title=Smoke check skipped::Could not read Terraform site_urls output: {exc}")
            sys.exit(0)

          if not isinstance(site_urls, dict) or not site_urls:
            print("::warning title=Smoke check skipped::Terraform site_urls output is empty.")
            sys.exit(0)

          print(next(iter(site_urls.values())))
          PY
          )"

          if [ -z "${SMOKE_URL}" ] || [ "${SMOKE_URL#::warning}" != "${SMOKE_URL}" ]; then
            [ -n "${SMOKE_URL}" ] && echo "${SMOKE_URL}"
            exit 0
          fi

          curl --fail --silent --show-error --location --max-time 30 "${SMOKE_URL}" > /dev/null
