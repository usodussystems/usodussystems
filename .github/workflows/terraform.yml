name: Terraform Apply

# Manual, environment-gated apply. AWS auth uses GitHub OIDC (no long-lived
# keys). Sensitive values (Cloudflare token, ACM ARN, state bucket, role ARN)
# come from GitHub secrets and are injected as TF_VAR_* env vars — never
# committed to the repo.
#
# Required repository secrets:
#   AWS_ROLE_TO_ASSUME    - IAM role GitHub OIDC assumes (trusts this repo).
#                           May be the same role Terraform assumes (TF_ROLE_ARN).
#   TF_STATE_BUCKET       - S3 bucket holding the tfstate
#   TF_ROLE_ARN           - IAM role Terraform assumes (provider + backend)
#   ACM_CERTIFICATE_ARN   - ACM cert ARN for CloudFront
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token
#   TF_TECHNICAL_OWNER, TF_OWNER - owner contact tags
#
# Required repository variables (non-sensitive):
#   AWS_REGION, TF_ENVIRONMENT, TF_DOMAIN_NAME, TF_SUBDOMAINS, TF_COST_CENTER
#   (TF_SUBDOMAINS must be an HCL/JSON list, e.g. ["app","www"])

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write   # required for AWS OIDC

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Non-sensitive Terraform inputs
  TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}
  TF_VAR_domain_name: ${{ vars.TF_DOMAIN_NAME }}
  TF_VAR_subdomains: ${{ vars.TF_SUBDOMAINS }}
  TF_VAR_artifact_folder: build
  TF_VAR_cost_center: ${{ vars.TF_COST_CENTER }}
  # Sensitive Terraform inputs (from secrets)
  TF_VAR_role_arn: ${{ secrets.TF_ROLE_ARN }}
  TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
  TF_VAR_technical_owner: ${{ secrets.TF_TECHNICAL_OWNER }}
  TF_VAR_owner: ${{ secrets.TF_OWNER }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: terraform
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Terraform reads ../build (var.artifact_folder) via fileset, so the
      # frontend must be built before plan/apply.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Build frontend
        working-directory: .
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-terraform-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cat > backend.hcl <<EOF
          bucket = "${{ secrets.TF_STATE_BUCKET }}"
          key    = "usodus/us-east-1/${{ vars.TF_ENVIRONMENT || 'dev' }}/main-webapp.tfstate"
          region = "${{ env.AWS_REGION }}"
          assume_role = {
            role_arn = "${{ secrets.TF_ROLE_ARN }}"
          }
          EOF
          terraform init -backend-config=backend.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -input=false -auto-approve -no-color
